name: Profile Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update timestamp in README
        run: |
          set -e
          current_date=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          if grep -q "<!-- LAST_UPDATED -->" README.md; then
            sed -E -i "s|^Last updated automatically:.*<!-- LAST_UPDATED -->$|Last updated automatically: ${current_date} <!-- LAST_UPDATED -->|" README.md

          # Commit and push only if README changed
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add README.md
          git commit -m "chore: update profile timestamp"
          git push
